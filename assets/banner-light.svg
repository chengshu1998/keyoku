<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f3f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    .orb1 { animation: float1 7s ease-in-out infinite; }
    .orb2 { animation: float2 9s ease-in-out infinite; }
    .orb3 { animation: float3 6s ease-in-out infinite; }
    .pulse { animation: pulse 4s ease-in-out infinite; }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); opacity: 0.06; }
      50% { transform: translate(12px, -6px); opacity: 0.12; }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); opacity: 0.05; }
      50% { transform: translate(-10px, 8px); opacity: 0.1; }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); opacity: 0.06; }
      50% { transform: translate(6px, -10px); opacity: 0.11; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="799" height="219" rx="16" fill="none" stroke="#e0d9f6" stroke-width="1"/>

  <!-- Glow bar -->
  <rect x="0" y="216" width="800" height="4" rx="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Floating orbs -->
  <circle class="orb1" cx="150" cy="50" r="70" fill="#818cf8" opacity="0.06"/>
  <circle class="orb2" cx="650" cy="160" r="90" fill="#a78bfa" opacity="0.05"/>
  <circle class="orb3" cx="350" cy="170" r="50" fill="#c4b5fd" opacity="0.06"/>

  <!-- Connector lines -->
  <g opacity="0.08">
    <line x1="100" y1="40" x2="300" y2="80" stroke="#6366f1" stroke-width="1"/>
    <line x1="500" y1="60" x2="700" y2="100" stroke="#818cf8" stroke-width="1"/>
    <line x1="200" y1="170" x2="600" y2="150" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Pulsing node dots -->
  <circle class="pulse" cx="100" cy="40" r="3" fill="#6366f1"/>
  <circle class="pulse" cx="300" cy="80" r="3" fill="#6366f1" style="animation-delay: 1s"/>
  <circle class="pulse" cx="500" cy="60" r="3" fill="#818cf8" style="animation-delay: 2s"/>
  <circle class="pulse" cx="700" cy="100" r="3" fill="#818cf8" style="animation-delay: 0.5s"/>
  <circle class="pulse" cx="200" cy="170" r="3" fill="#a78bfa" style="animation-delay: 1.5s"/>
  <circle class="pulse" cx="600" cy="150" r="3" fill="#a78bfa" style="animation-delay: 3s"/>

  <!-- Title -->
  <text x="400" y="95" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace"
        font-size="50" font-weight="700" fill="#1e1b4b" text-anchor="middle" letter-spacing="-1">
    Keyoku
  </text>

  <!-- Tagline -->
  <text x="400" y="130" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="18" fill="#4338ca" text-anchor="middle" letter-spacing="0.5" opacity="0.7">
    TypeScript SDK for AI Memory
  </text>

  <!-- Subtitle pills -->
  <g transform="translate(400, 162)" text-anchor="middle">
    <rect x="-170" y="-14" width="100" height="24" rx="12" fill="#6366f1" opacity="0.08"/>
    <text x="-120" y="4" font-family="ui-monospace, monospace" font-size="11" fill="#4338ca">TypeScript</text>

    <rect x="-50" y="-14" width="100" height="24" rx="12" fill="#6366f1" opacity="0.08"/>
    <text x="0" y="4" font-family="ui-monospace, monospace" font-size="11" fill="#4338ca">OpenClaw</text>

    <rect x="70" y="-14" width="100" height="24" rx="12" fill="#6366f1" opacity="0.08"/>
    <text x="120" y="4" font-family="ui-monospace, monospace" font-size="11" fill="#4338ca">Semantic</text>
  </g>
</svg>
